name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Shared must build first — composite project references require
      # .d.ts declarations to exist before dependents (server/client)
      # can typecheck or lint. This is by design, not a workaround.
      - name: Build shared package (declarations for server/client)
        run: pnpm -C packages/shared build

      - name: Lint
        run: pnpm lint

      - name: Build all packages
        run: pnpm build

      - name: Unit tests
        run: pnpm test
