name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: server uses tsc -b which builds shared via project
      # references. Client uses tsc + vite. Order handled by pnpm workspace.
      - name: Build all packages
        run: pnpm build

      # Lint after build: @typescript-eslint needs @cc/shared declarations
      # which are generated during the build step above.
      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
